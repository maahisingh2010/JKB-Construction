<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JKB Construction | Building The Future</title>
    <meta name="description" content="Professional construction services for residential and commercial projects. Get a quote today." />
  </head>
  <body>
    <div id="error-log" style="position:fixed; z-index:9999; background:red; color:white; font-size:20px; top:0; left:0; right:0;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('error-log').innerText = msg + '\n' + (error ? error.stack : '');
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').innerText = 'Promise rejection: ' + event.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
